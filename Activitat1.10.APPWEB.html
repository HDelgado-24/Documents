<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="estiloformulario.css">
</head>
<body>
     <h1>Registro de usuario</h1>
    <form action="#" method="post">
    <fieldset>
    <legend>Nuevo Usuario</legend>
    <br>
    <label for="fname">Nombre:</label>
    <input type="text" id="fname" name="fname" required>
    <br><br>
    <label for="lname">Apellidos:</label>
    <input type="text" id="lname" name="lname" required>
    <br><br>
    <label for="gender">Sexo:</label>
    <input type="radio" id="male" name="gender" required>
    <label for="gender">hombre</label>
    <input type="radio" id="female" name="gender"required>
    <label for="gender">mujer</label>
    <br><br>
    <label for="email">Correo:</label>
    <input type="email" id="email" name="email" required>
    <br><br>
    <input type="checkbox" name="notifications" id="notifications">
    <label for="notifications">Deseo recibir inormación sobre novedades y ofertas</label>
    <br><br>
    <input type="checkbox" name="terms" id="terms" required>
    <label for="terms">Declaro haber leído y aceptar las condiciones generales del programa y la normativa sobre protección de datos</label>
    <br><br>
    <input type="submit" value="Enviar">
    </fieldset>
    </form>
    <br><br><br><br><br>
    <h1>Registro de usuario</h1>
    <form action="#" method="post">
        <fieldset class="pers">
            <legend class="pers">Información Personal</legend>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required> <br><br>

            <label for="fechaNacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fechaNacimiento" name="fechaNacimiento" required><br><br>

            <legend>Género:</legend>
            <input type="radio" id="masculino" name="genero" value="Masculino" required>
            <label for="masculino">Masculino</label><br>

            <input type="radio" id="femenino" name="genero" value="Femenino">
            <label for="femenino">Femenino</label><br>

            <input type="radio" id="otro" name="genero" value="Otro">
            <label for="otro">Otro</label><br><br>
        </fieldset>

        <fieldset class="cont">
            <legend class="cont">Información de Contacto</legend>
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="telefono">Número de Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required><br><br>

            <label for="direccion">Dirección:</label><br>
            <textarea id="direccion" name="direccion" rows="4" cols="50"></textarea><br><br>
        </fieldset>

        <fieldset class="cuent">
            <legend class="cuent">Información de Cuenta</legend>
            <label for="usuario">Nombre de Usuario:</label>
            <input type="text" id="usuario" name="usuario" required><br><br>

            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" required><br><br>

            <label for="confirmacionContrasena">Confirmar Contraseña:</label>
            <input type="password" id="confirmacionContrasena" name="confirmacionContrasena" required><br><br>
        </fieldset>

        <fieldset class="pref">
            <legend class="pref">Preferencias</legend>
            <label for="colorFavorito">Seleccionar un Color Favorito:</label>
            <select id="colorFavorito" name="colorFavorito">
                <option value="Rojo">Rojo</option>
                <option value="Azul">Azul</option>
                <option value="Verde">Verde</option>
                <option value="Amarillo">Amarillo</option>
            </select><br><br>

            <input type="checkbox" id="aceptarTerminos" name="aceptarTerminos" required>
            <label for="aceptarTerminos">Acepto los Términos y Condiciones</label><br><br>
        </fieldset>

        <input type="submit" value="Registrarse" id="boton">
    </form>
</body>
</html>

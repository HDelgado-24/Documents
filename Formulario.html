<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="http://www.google.com/search" method="get">
        <fieldset>
        <legend>Datos de contacto</legend>
        <label for=""></label>Nombre:
        <br>
        <input type="text">
        <br>
        Dirección:
        <br>
        <input type="text">
        <br>
        Teléfono:
        <br>
        <input type="number">
        <br><br>
        <select name="lista_de_seleccion">
            <option value="opcion 1">Opción 1</option>
            <option value="opcion 2">Opción 2</option>
            <option value="opcion 3">Opción 3</option>
        </select>
        <br>
        <br>
        <textarea name="area_de_texto" rows="3" cols="50"></textarea>
        <br>
        Google:
        <br>
        <input type="search" name="q">
        <br><br>
        <input type="submit" value="Buscar">
    </fieldset>
    </form>
    <br><br><br><br><br><br><br><br><br><br><br>
    <form action="#" method="get">
    <label for="fname">Nombre:</label><br>
    <input type="text" id="fname" name="fname" required><br>
    <label for="lname">Apellido:</label><br>
    <input type="text" id="lname" name="lname" required><br>
    <label for="email">Correo electrónico:</label><br>
    <input type="email" id="email" name="email" required><br>
    <label for="birthday">Fecha de nacimiento:</label><br>
    <input type="date" id="birthday" name="birthday" required><br>
    <label for="website">Sitio web:</label><br>
    <input type="url" id="website" name="website" required><br>
    <label for="gender">Género:</label><br>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Masculino</label><br>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Femenino</label><br>
    <input type="radio" id="other" name="gender" value="other">
    <label for="other">Otro</label><br>
    <label for="favcolor">Color favorito:</label><br>
    <input type="color" id="favcolor" name="favcolor" value="#ff0000"><br>
    <label for="appt">Elige una hora para la cita:</label><br>
    <input type="time" id="appt" name="appt"><br>
    <input type="submit" value="Enviar">
  </form>
</body>
</html>
